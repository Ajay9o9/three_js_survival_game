<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survival Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-screen h1 {
      color: #e0e0e0;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }
    #loading-screen p {
      color: #888;
      font-size: 1rem;
    }
    .loading-bar-container {
      width: 300px;
      height: 6px;
      background: #333;
      border-radius: 3px;
      margin-top: 1.5rem;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    #debug-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 4px;
      z-index: 50;
      pointer-events: none;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading-screen">
      <h1>SURVIVAL GAME</h1>
      <p>Loading world...</p>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
    </div>
    <div id="debug-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
